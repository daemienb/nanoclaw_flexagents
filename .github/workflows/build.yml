name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'container/**'
      - 'Dockerfile'
      - 'package*.json'
      - 'tsconfig.json'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORCHESTRATOR_IMAGE: ghcr.io/${{ github.repository_owner }}/nanoclaw-flexagents
  AGENT_IMAGE: ghcr.io/${{ github.repository_owner }}/nanoclaw-flexagents-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push orchestrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.ORCHESTRATOR_IMAGE }}:latest
          build-args: |
            GIT_SHA=${{ github.sha }}
          no-cache: true

      - name: Build and push agent
        uses: docker/build-push-action@v6
        with:
          context: container
          file: container/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.AGENT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

